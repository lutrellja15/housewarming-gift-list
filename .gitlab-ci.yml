image: node:22

cache:
  key:
    files:
      - package-lock.json
  paths:
    - .npm/

stages:
  - test
  - deploy

test:
  stage: test
  script:
    - npm ci --cache .npm --prefer-offline
    - npm run lint
    - npm run test
    - npm run build

pages:
  stage: deploy
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  script:
    - npm ci --cache .npm --prefer-offline
    - npm run build
    - rm -rf public
    - mv dist public
  artifacts:
    paths:
      - public
